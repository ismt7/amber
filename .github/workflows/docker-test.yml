name: Docker Test

on:
  push:
  pull_request:

jobs:
  docker-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: amber
          POSTGRES_USER: amber
          POSTGRES_PASSWORD: amber
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U amber -d amber"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile
          target: runner
          tags: amber-test:latest
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name amber-test --add-host=host.docker.internal:host-gateway -p 3000:3000 -e DATABASE_URL=postgres://amber:amber@host.docker.internal:5432/amber?sslmode=disable amber-test:latest

      - name: Wait for container to be ready
        run: sleep 10

      - name: Smoke test
        run: curl --retry 5 --retry-delay 3 --retry-connrefused -f http://localhost:3000/

      - name: Dump container logs
        if: failure()
        run: docker logs amber-test

      - name: Cleanup
        if: always()
        run: docker stop amber-test && docker rm amber-test
