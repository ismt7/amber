# Top-level settings are applied to all feeds.
# 
# Example:
# defaultLimit: 100
# highlightKeywords:
#   - release
#   - React
# filterKeywords:
#   - podcast
defaultLimit: 100
highlightKeywords:
  - release
  - React
filterKeywords:
  - podcast

# Feeds are defined in this section.
#
# Example:
# - id: gihyo
#   title: 技術評論者
#   url: https://gihyo.jp/feed/rss2
#   siteUrl: https://gihyo.jp/
#   highlightKeywords:
#     - AI
#   filterKeywords:
#     - PR
feeds:
  - id: gihyo
    title: 技術評論者
    url: https://gihyo.jp/feed/rss2
    siteUrl: https://gihyo.jp/

  - id: publickey
    title: Publickey
    url: https://www.publickey1.jp/atom.xml
    siteUrl: https://www.publickey1.jp/
    highlightKeywords:
      - AI
      - LLM
      - エージェント
      - Agent
      - AGENT
    filterKeywords:
      - PR
