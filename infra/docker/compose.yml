services:
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      DATABASE_URL: postgres://amber:amber@postgres:5432/amber
      BATCH_FETCH_TOKEN: ${BATCH_FETCH_TOKEN:-local-dev-batch-token}
      IN_APP_FEED_SYNC_ENABLED: ${IN_APP_FEED_SYNC_ENABLED:-true}
      FEED_SYNC_INTERVAL_SECONDS: ${FEED_SYNC_INTERVAL_SECONDS:-1800}
    volumes:
      - ../..:/app
      - ../../feeds.yaml:/app/feeds.yaml:ro
    command: npm run dev
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: amber
      POSTGRES_USER: amber
      POSTGRES_PASSWORD: amber
    ports:
      - "5432:5432"
    volumes:
      - amber-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  amber-postgres-data:
